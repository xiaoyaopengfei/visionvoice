<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>视声 VisionVoice</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080f; --surface: #10121e; --surface2: #181a2a;
    --accent: #00f0c8; --accent2: #7b5ef8; --danger: #ff4d6d;
    --text: #eeeeff; --muted: #6b6d8a; --border: rgba(255,255,255,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', sans-serif; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0,240,200,0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 50% at 20% 80%, rgba(123,94,248,0.07) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 24px 20px 60px; }

header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; }
.logo { font-family: ‘Syne’, sans-serif; font-size: 26px; font-weight: 800; color: var(–accent); letter-spacing: -1px; line-height: 1; }
.logo span { color: var(–text); }
.tagline { font-size: 11px; letter-spacing: 1px; color: var(–muted); margin-top: 4px; }
.key-badge { font-size: 12px; background: var(–surface2); border: 1px solid var(–border); border-radius: 20px; padding: 7px 14px; color: var(–muted); cursor: pointer; white-space: nowrap; }
.key-badge.set { color: var(–accent); border-color: rgba(0,240,200,0.3); }

.modes { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
.modes::-webkit-scrollbar { display: none; }
.mode-btn { display: flex; align-items: center; gap: 6px; padding: 10px 16px; border-radius: 50px; border: 1px solid var(–border); background: var(–surface); color: var(–muted); font-size: 13px; white-space: nowrap; cursor: pointer; transition: all 0.2s; font-family: -apple-system, ‘PingFang SC’, sans-serif; }
.mode-btn.active { background: rgba(0,240,200,0.1); border-color: rgba(0,240,200,0.4); color: var(–accent); }

.capture-zone { border-radius: 24px; border: 2px dashed rgba(0,240,200,0.2); min-height: 240px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; overflow: hidden; cursor: pointer; transition: border-color 0.3s; background: var(–surface); }
.capture-zone.has-image { border-style: solid; border-color: var(–accent); }
.capture-zone img { width: 100%; object-fit: cover; min-height: 240px; display: block; }
.placeholder { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 40px 20px; text-align: center; }
.cam-circle { width: 80px; height: 80px; border-radius: 50%; background: rgba(0,240,200,0.08); display: flex; align-items: center; justify-content: center; font-size: 32px; animation: pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
.placeholder-title { font-size: 18px; font-weight: 700; }
.placeholder-sub { font-size: 13px; color: var(–muted); line-height: 1.6; max-width: 220px; }

.btn-row { display: flex; gap: 10px; margin-bottom: 12px; }
.btn-secondary { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border-radius: 16px; background: var(–surface); border: 1px solid var(–border); color: var(–text); font-size: 14px; cursor: pointer; font-family: -apple-system, ‘PingFang SC’, sans-serif; }
.btn-secondary:active { opacity: 0.7; }

.btn-analyze { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 18px; border-radius: 16px; background: var(–accent); border: none; color: #000; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; font-family: -apple-system, ‘PingFang SC’, sans-serif; }
.btn-analyze:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-analyze.loading { background: var(–surface2); color: var(–muted); border: 1px solid var(–border); }

.spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(–accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

.speaking-bar { display: none; align-items: center; justify-content: space-between; background: rgba(123,94,248,0.15); border: 1px solid rgba(123,94,248,0.3); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; cursor: pointer; }
.speaking-bar.visible { display: flex; }
.speaking-bar span { color: #c4b5fd; font-size: 14px; }
.wave { display: flex; gap: 3px; align-items: center; }
.wave-bar { width: 3px; border-radius: 3px; background: #7b5ef8; animation: wave 1s ease-in-out infinite; }
.wave-bar:nth-child(1){height:8px;animation-delay:0s} .wave-bar:nth-child(2){height:14px;animation-delay:.1s} .wave-bar:nth-child(3){height:10px;animation-delay:.2s} .wave-bar:nth-child(4){height:16px;animation-delay:.15s} .wave-bar:nth-child(5){height:8px;animation-delay:.05s}
@keyframes wave { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.4)} }

.result-card { background: var(–surface); border: 1px solid rgba(0,240,200,0.15); border-radius: 20px; padding: 20px; margin-bottom: 16px; display: none; animation: fadeUp 0.4s ease; }
.result-card.visible { display: block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.result-label { font-size: 10px; letter-spacing: 2px; color: var(–accent); font-weight: 700; margin-bottom: 12px; }
.result-text { font-size: 16px; line-height: 1.8; color: var(–text); }
.replay-btn { display: flex; align-items: center; gap: 6px; margin-top: 16px; color: var(–accent); font-size: 13px; cursor: pointer; background: none; border: none; padding: 0; font-family: -apple-system, ‘PingFang SC’, sans-serif; }

.history-section { margin-bottom: 16px; display: none; }
.history-section.visible { display: block; }
.history-title { font-size: 10px; letter-spacing: 2px; color: var(–muted); font-weight: 700; margin-bottom: 10px; }
.history-item { background: var(–surface); border-radius: 12px; padding: 14px; margin-bottom: 8px; border-left: 3px solid var(–accent2); cursor: pointer; }
.history-meta { font-size: 11px; color: rgba(107,109,138,0.5); margin-bottom: 4px; }
.history-text { font-size: 13px; color: var(–muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.hint { background: rgba(0,240,200,0.04); border: 1px solid rgba(0,240,200,0.1); border-radius: 12px; padding: 14px; text-align: center; }
.hint p { font-size: 12px; color: var(–muted); line-height: 1.6; }
.hint strong { color: var(–accent); }

#file-input, #camera-input { display: none; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(–surface); border: 1px solid var(–border); border-radius: 20px; padding: 28px; width: 100%; max-width: 400px; }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(–muted); margin-bottom: 20px; line-height: 1.7; }
.modal input { width: 100%; background: var(–surface2); border: 1px solid var(–border); border-radius: 12px; padding: 14px 16px; color: var(–text); font-size: 13px; font-family: monospace; margin-bottom: 12px; outline: none; }
.modal input:focus { border-color: var(–accent); }
.modal-btns { display: flex; gap: 10px; }
.btn-save { flex: 1; background: var(–accent); color: #000; border: none; border-radius: 12px; padding: 14px; font-weight: 700; font-size: 14px; cursor: pointer; }
.btn-cancel { background: var(–surface2); color: var(–muted); border: 1px solid var(–border); border-radius: 12px; padding: 14px 20px; font-size: 14px; cursor: pointer; }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e1e2e; border: 1px solid var(–border); color: var(–text); padding: 12px 20px; border-radius: 50px; font-size: 13px; z-index: 200; transition: transform 0.3s ease; white-space: nowrap; max-width: 90vw; text-align: center; }
.toast.error { background: var(–danger); border-color: var(–danger); }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="logo">视声<span> AI</span></div>
      <div class="tagline">拍照 · AI描述 · 自动朗读</div>
    </div>
    <div class="key-badge" id="key-badge" onclick="openModal()">⚙ 设置密钥</div>
  </header>

  <div class="modes">
    <button class="mode-btn active" data-mode="describe" onclick="setMode(this)">👁 描述场景</button>
    <button class="mode-btn" data-mode="objects" onclick="setMode(this)">📦 识别物体</button>
    <button class="mode-btn" data-mode="text" onclick="setMode(this)">📝 读取文字</button>
    <button class="mode-btn" data-mode="danger" onclick="setMode(this)">⚠️ 危险检测</button>
  </div>

  <div class="capture-zone" id="capture-zone" onclick="document.getElementById('camera-input').click()">
    <div class="placeholder" id="placeholder">
      <div class="cam-circle">📷</div>
      <div class="placeholder-title">点击拍照</div>
      <div class="placeholder-sub">AI 将描述画面内容并自动朗读</div>
    </div>
    <img id="preview-img" style="display:none" alt="已选择的图片" />
  </div>

  <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleFile(this)">
  <input type="file" id="file-input" accept="image/*" onchange="handleFile(this)">

  <div class="btn-row">
    <button class="btn-secondary" onclick="document.getElementById('file-input').click()">🖼 从相册选择</button>
    <button class="btn-secondary" onclick="document.getElementById('camera-input').click()">📷 拍照</button>
  </div>

  <button class="btn-analyze" id="analyze-btn" onclick="analyze()" disabled>
    🔍 开始分析
  </button>

  <div class="speaking-bar" id="speaking-bar" onclick="stopSpeaking()">
    <span>🔊 正在朗读... 点击停止</span>
    <div class="wave">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-label">AI 描述结果</div>
    <div class="result-text" id="result-text"></div>
    <button class="replay-btn" onclick="speakText(currentResult)">🔊 重新朗读</button>
  </div>

  <div class="history-section" id="history-section">
    <div class="history-title">最近记录</div>
    <div id="history-list"></div>
  </div>

  <div class="hint">
    <p>💡 <strong>提示：</strong>分析完成后自动朗读。点击历史记录可重新播放。</p>
  </div>

</div>

<!-- API Key 弹窗 -->

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>🔑 设置 API 密钥</h3>
    <p>去 <strong>siliconflow.cn</strong> → 右上角头像 → API密钥 → 新建密钥，粘贴到下方。密钥只保存在你的设备上。</p>
    <input type="password" id="key-input" placeholder="sk-..." />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveKey()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentMode = 'describe';
  let currentImageDataUrl = null;
  let currentResult = '';
  let history = [];
  let apiKey = localStorage.getItem('sf_key') || 'sk-kcdjxgxujkgkfuxyqfyebqdwvjczsmtihydslzpfurttaogt';

  const PROMPTS = {
    describe: "你在帮助盲人了解周围环境。用中文描述场景，重点说明：整体是什么地方、各方位有什么物体（左边、右边、正前方、身后、头顶、地面）、人物位置和动作、光线和空间大小。去掉感叹词和情感修饰，只说实用的方位和空间信息。100字以内。",
    objects: "你在帮助盲人识别周围物体。用中文逐一说明每个物体：名称、在哪个方位（左前、右后、正中等）、距离远近（近在眼前、约一步、较远）、大概高度（地面、腰部、头部以上）。这些信息帮助盲人判断如何移动。",
    text: "读出图片中所有可见文字，按从上到下、从左到右的顺序。直接念内容，不加任何开场白。没有文字就说：没有文字。",
    danger: "你在帮助盲人判断环境安全。说明：前方地面是否平整、有无台阶或坡道（上下方向）、有无障碍物及其位置、有无运动中的车辆或人。安全就说：前方安全，可以通行。有危险直接说位置和危险类型。50字以内。",
  };

  function updateKeyBadge() {
    const badge = document.getElementById('key-badge');
    if (apiKey && apiKey.length > 10) { badge.textContent = '✓ 密钥已设置'; badge.classList.add('set'); }
    else { badge.textContent = '⚙ 设置密钥'; badge.classList.remove('set'); }
  }
  updateKeyBadge();

  function setMode(btn) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      currentImageDataUrl = e.target.result;
      const img = document.getElementById('preview-img');
      img.src = currentImageDataUrl;
      img.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('capture-zone').classList.add('has-image');
      document.getElementById('analyze-btn').disabled = false;
      document.getElementById('result-card').classList.remove('visible');
    };
    reader.readAsDataURL(file);
    input.value = '';
  }

  async function analyze() {
    if (!currentImageDataUrl) return;
    if (!apiKey || apiKey.length < 10) { showToast('请先设置 API 密钥', true); openModal(); return; }

    // 在用户点击时预先解锁浏览器语音权限
    const unlock = new SpeechSynthesisUtterance('');
    window.speechSynthesis.speak(unlock);
    window.speechSynthesis.cancel();

    const btn = document.getElementById('analyze-btn');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.innerHTML = '<div class="spinner"></div> 分析中...';

    try {
      const response = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
          model: 'Qwen/Qwen2.5-VL-72B-Instruct',
          max_tokens: 512,
          messages: [{
            role: 'user',
            content: [
              { type: 'image_url', image_url: { url: currentImageDataUrl } },
              { type: 'text', text: PROMPTS[currentMode] }
            ]
          }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err?.error?.message || '请求失败');
      }

      const data = await response.json();
      const text = data.choices?.[0]?.message?.content || '无法分析图片';
      currentResult = text;
      document.getElementById('result-text').textContent = text;
      document.getElementById('result-card').classList.add('visible');

      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      const modeNames = { describe:'描述', objects:'物体', text:'文字', danger:'危险' };
      history.unshift({ time, mode: modeNames[currentMode], text });
      if (history.length > 5) history.pop();
      renderHistory();
      speakText(text);

    } catch (e) {
      showToast('错误：' + e.message, true);
    }

    btn.disabled = false;
    btn.classList.remove('loading');
    btn.innerHTML = '🔍 开始分析';
  }

  function speakText(text) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-CN';
    utter.rate = 0.9;
    utter.pitch = 1.0;
    utter.onstart = () => document.getElementById('speaking-bar').classList.add('visible');
    utter.onend = () => document.getElementById('speaking-bar').classList.remove('visible');
    utter.onerror = () => document.getElementById('speaking-bar').classList.remove('visible');
    window.speechSynthesis.speak(utter);
  }

  function stopSpeaking() {
    window.speechSynthesis.cancel();
    document.getElementById('speaking-bar').classList.remove('visible');
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');
    if (!history.length) { section.classList.remove('visible'); return; }
    section.classList.add('visible');
    list.innerHTML = history.map(item => `
      <div class="history-item" onclick="speakText(${JSON.stringify(item.text)})">
        <div class="history-meta">${item.time} · ${item.mode}</div>
        <div class="history-text">${item.text}</div>
      </div>
    `).join('');
  }

  function openModal() { document.getElementById('key-input').value = apiKey || ''; document.getElementById('modal-overlay').classList.add('open'); }
  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
  function saveKey() {
    const val = document.getElementById('key-input').value.trim();
    if (!val) { showToast('请输入有效的密钥', true); return; }
    apiKey = val; localStorage.setItem('sf_key', val);
    updateKeyBadge(); closeModal(); showToast('密钥已保存！');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
</script>

</body>
</html>
